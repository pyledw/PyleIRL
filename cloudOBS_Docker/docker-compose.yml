version: "3.8"

services:
  obs-studio:
    image: lscr.io/linuxserver/webtop:debian-xfce
    container_name: obs-studio
    shm_size: "4gb" # Required for OBS Studio and desktop environments to not crash
    entrypoint: 
      - /bin/bash
      - -c
      - |
        # Ensure the default user can run sudo without a password
        mkdir -p /etc/sudoers.d
        echo "ALL ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/abc
        chmod 440 /etc/sudoers.d/abc
        
        # Create the visible installation script in a safe system folder
        cat << 'EOF' > /usr/local/bin/install-obs.sh
        #!/bin/bash
        
        if ! command -v obs >/dev/null 2>&1; then
            echo -e "\e[1;32m=====================================================================\e[0m"
            echo -e "\e[1;32m WELCOME TO CLOUD OBS!\e[0m"
            echo -e "\e[1;32m We are installing OBS Studio and building the SRTLA Plugin now.\e[0m"
            echo -e "\e[1;32m Please wait 3-5 minutes. Do not close this window.\e[0m"
            echo -e "\e[1;32m=====================================================================\e[0m"
            echo ""
            
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends obs-studio wget xz-utils ca-certificates curl jq
            
            echo -e "\n\e[1;34m--> Downloading Prebuilt SRTLA Plugin...\e[0m"
            mkdir -p /tmp/srtla
            
            # Fetch the download URL of the latest release asset matching ubuntu-gnu.tar.xz
            DOWNLOAD_URL=$(curl -s https://api.github.com/repos/pyledw/PyleIRL/releases/latest | jq -r '.assets[] | select(.name | endswith("ubuntu-gnu.tar.xz")) | .browser_download_url')
            
            if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
                wget -qO /tmp/srtla/plugin.tar.xz "$DOWNLOAD_URL"
            fi
            
            if [ -f "/tmp/srtla/plugin.tar.xz" ]; then
                tar -xf /tmp/srtla/plugin.tar.xz -C /tmp/srtla/
                
                mkdir -p /config/.config/obs-studio/plugins/PyleIRL/bin/64bit
                mkdir -p /config/.config/obs-studio/plugins/PyleIRL/data
                
                find /tmp/srtla -name "*.so" -exec cp {} /config/.config/obs-studio/plugins/PyleIRL/bin/64bit/ \;
                
                # Copy translation/data files if they exist in the extracted folder
                if [ -d "/tmp/srtla/share/obs/obs-plugins/PyleIRL" ]; then
                    cp -r /tmp/srtla/share/obs/obs-plugins/PyleIRL/* /config/.config/obs-studio/plugins/PyleIRL/data/ 2>/dev/null || true
                elif [ -d "/tmp/srtla/data" ]; then
                    cp -r /tmp/srtla/data/* /config/.config/obs-studio/plugins/PyleIRL/data/ 2>/dev/null || true
                fi
                
                echo -e "\n\e[1;32m=====================================================================\e[0m"
                echo -e "\e[1;32m INSTALLATION COMPLETE! Launching OBS Studio...\e[0m"
                echo -e "\e[1;32m=====================================================================\e[0m"
                sleep 3
            else
                echo -e "\n\e[1;31m=====================================================================\e[0m"
                echo -e "\e[1;31m ERROR: Failed to download plugin release! Check URL.\e[0m"
                echo -e "\e[1;31m=====================================================================\e[0m"
                sleep 15
            fi
            
            rm -rf /tmp/srtla
        fi
        
        # Ensure our custom scenes are injected on every boot so they are always available
        mkdir -p /config/.config/obs-studio/basic/scenes/
        cp /default_scenes.json "/config/.config/obs-studio/basic/scenes/Default SRTLA.json" 2>/dev/null || true
        chown -R abc:abc /config/.config/obs-studio/basic/scenes/
        
        # If this is a completely fresh install (no global.ini), force OBS to load Default SRTLA by default
        if [ ! -f "/config/.config/obs-studio/global.ini" ]; then
            echo "[Basic]" > /config/.config/obs-studio/global.ini
            echo "SceneCollection=Default SRTLA" >> /config/.config/obs-studio/global.ini
            echo "SceneCollectionFile=Default SRTLA" >> /config/.config/obs-studio/global.ini
            chown abc:abc /config/.config/obs-studio/global.ini
        fi
        
        # Force the desktop resolution to 1080p so OBS natively defaults to a 1080p canvas
        xrandr -s 1920x1080 >/dev/null 2>&1 || true
        
        # Ensure desktop shortcut exists for future clicks
        mkdir -p /config/Desktop
        cat << 'SHORTCUT' > /config/Desktop/obs-studio.desktop
        [Desktop Entry]
        Type=Application
        Exec=obs
        Icon=obs
        Name=OBS Studio
        Terminal=false
        SHORTCUT
        chmod +x /config/Desktop/obs-studio.desktop
        
        # Launch OBS Studio
        obs
        EOF
        chmod +x /usr/local/bin/install-obs.sh
        
        # Create an XFCE autostart entry so the terminal automatically pops up on boot
        mkdir -p /config/.config/autostart
        cat << 'EOF' > /config/.config/autostart/obs-installer.desktop
        [Desktop Entry]
        Type=Application
        Exec=xfce4-terminal --command="bash -c '/usr/local/bin/install-obs.sh; exec bash'"
        Hidden=false
        Name=OBS Installer
        X-GNOME-Autostart-enabled=true
        EOF
        
        # CRITICAL FIX: The previous script ran 'chown abc:abc' before 'abc' existed, 
        # leaving /config owned by root and completely crashing XFCE! 
        # Using numerical ID 1000 guarantees perfect permissions.
        chown -R 1000:1000 /config
        
        # Start the desktop natively
        exec /init
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - LIBGL_ALWAYS_SOFTWARE=1 # Required since Hyper-V VM has no GPU
    volumes:
      - ./config_debian:/config
      - ./default_scenes.json:/default_scenes.json:ro
    ports:
      - "3000:3000" # KasmVNC Web UI
      - "4455:4455" # OBS WebSockets
      - "5050-5060:5050-5060/udp" # SRTLA Ports
    restart: unless-stopped
